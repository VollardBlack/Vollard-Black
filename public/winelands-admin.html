<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winelands · Event Registrations Admin</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1a2744;--navy-mid:#162038;--navy-light:#1e2d4f;
  --gold:#c9a84c;--gold-light:#dfc06a;--gold-dim:rgba(201,168,76,0.12);
  --gold-border:rgba(201,168,76,0.25);--cream:#e8edf5;
  --fog:rgba(232,237,245,0.45);--mist:rgba(232,237,245,0.15);
  --green:#5aaa7a;--green-dim:rgba(90,170,122,0.15);
  --green-border:rgba(90,170,122,0.3);--red:#b04040;
  --white:#fff;
}
html,body{min-height:100vh;background:var(--navy);color:var(--cream);
  font-family:-apple-system,'DM Sans',system-ui,sans-serif;font-size:14px;
  -webkit-font-smoothing:antialiased;}

/* ── LOGIN ── */
#loginWrap{display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;}
.login-card{width:100%;max-width:380px;background:var(--navy-mid);
  border:1px solid var(--gold-border);border-radius:8px;padding:36px;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-w{font-family:Georgia,serif;font-size:36px;color:var(--gold);display:block;}
.login-name{font-size:10px;letter-spacing:0.4em;text-transform:uppercase;
  color:var(--fog);margin-top:4px;}
.login-title{font-family:Georgia,serif;font-size:22px;font-weight:400;
  color:var(--white);margin-bottom:24px;}
.lfield{margin-bottom:16px;}
.lfield label{display:block;font-size:9px;letter-spacing:0.28em;
  text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.lfield input{width:100%;padding:13px 16px;background:rgba(232,237,245,0.06);
  border:1px solid rgba(232,237,245,0.12);border-radius:6px;
  color:var(--cream);font-size:15px;outline:none;
  font-family:inherit;transition:border-color 0.2s;}
.lfield input:focus{border-color:var(--gold);}
.btn-login{width:100%;padding:14px;margin-top:8px;
  background:linear-gradient(135deg,var(--gold),#a07828);
  border:none;border-radius:6px;color:#1a2744;font-family:inherit;
  font-size:12px;font-weight:700;letter-spacing:0.18em;
  text-transform:uppercase;cursor:pointer;}
.login-err{color:#e07070;font-size:11px;margin-top:10px;
  text-align:center;display:none;}
.login-err.show{display:block;}

/* ── APP SHELL ── */
#appWrap{display:none;}
.topbar{height:60px;background:var(--navy-mid);border-bottom:1px solid var(--gold-border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:16px;}
.topbar-logo{font-family:Georgia,serif;font-size:18px;color:var(--gold);letter-spacing:0.08em;}
.topbar-badge{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;
  background:var(--gold-dim);border:1px solid var(--gold-border);
  color:var(--gold-light);padding:3px 10px;border-radius:3px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.btn-sm{padding:7px 16px;font-size:10px;font-weight:600;letter-spacing:0.12em;
  text-transform:uppercase;border-radius:4px;cursor:pointer;
  font-family:inherit;transition:all 0.2s;}
.btn-outline{background:transparent;border:1px solid var(--gold-border);color:var(--fog);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#a07828);
  border:none;color:#1a2744;font-weight:700;}

.content{padding:28px;}

/* ── STATS BAR ── */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:14px;margin-bottom:28px;}
.stat-card{background:var(--navy-mid);border:1px solid rgba(232,237,245,0.07);
  border-radius:6px;padding:18px 20px;}
.stat-num{font-family:Georgia,serif;font-size:32px;font-weight:400;
  color:var(--gold);line-height:1;}
.stat-lbl{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--fog);margin-top:6px;}
.stat-card.green .stat-num{color:var(--green);}
.stat-card.white .stat-num{color:var(--white);}

/* ── FILTERS ── */
.filters{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.filter-search{flex:1;min-width:200px;padding:10px 14px;
  background:var(--navy-mid);border:1px solid rgba(232,237,245,0.1);
  border-radius:6px;color:var(--cream);font-family:inherit;font-size:13px;outline:none;}
.filter-search:focus{border-color:var(--gold);}
.filter-search::placeholder{color:var(--fog);}
.filter-tabs{display:flex;gap:6px;}
.ftab{padding:8px 16px;font-size:10px;font-weight:600;letter-spacing:0.12em;
  text-transform:uppercase;border-radius:4px;cursor:pointer;font-family:inherit;
  background:transparent;border:1px solid rgba(232,237,245,0.1);
  color:var(--fog);transition:all 0.2s;}
.ftab.active{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold);}

/* ── TABLE ── */
.table-wrap{background:var(--navy-mid);border:1px solid rgba(232,237,245,0.07);
  border-radius:8px;overflow:hidden;}
.table-header{display:grid;grid-template-columns:40px 1fr 1fr 120px 110px 130px 110px 100px;
  gap:0;padding:12px 20px;border-bottom:1px solid rgba(232,237,245,0.07);
  background:rgba(232,237,245,0.03);}
.th{font-size:9px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--fog);user-select:none;cursor:pointer;}
.th:hover{color:var(--gold);}
.table-body{max-height:calc(100vh - 340px);overflow-y:auto;}
.table-body::-webkit-scrollbar{width:3px;}
.table-body::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.2);}
.trow{display:grid;grid-template-columns:40px 1fr 1fr 120px 110px 130px 110px 100px;
  gap:0;padding:14px 20px;border-bottom:1px solid rgba(232,237,245,0.04);
  transition:background 0.15s;align-items:center;}
.trow:hover{background:rgba(232,237,245,0.03);}
.trow:last-child{border-bottom:none;}
.td{font-size:12px;color:var(--cream);padding-right:12px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;}
.td.muted{color:var(--fog);}
.td.gold{color:var(--gold-light);font-family:Georgia,serif;font-size:14px;}
.td.mono{font-family:'Courier New',monospace;font-size:11px;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;
  font-weight:600;letter-spacing:0.15em;text-transform:uppercase;
  padding:3px 9px;border-radius:3px;}
.badge-price{background:rgba(201,168,76,0.12);color:var(--gold-light);
  border:1px solid rgba(201,168,76,0.25);}
.badge-weight{background:rgba(90,130,200,0.12);color:#8ab4f8;
  border:1px solid rgba(90,130,200,0.25);}
.badge-invited{background:var(--green-dim);color:var(--green);
  border:1px solid var(--green-border);}
.badge-pending{background:rgba(232,237,245,0.06);color:var(--fog);
  border:1px solid rgba(232,237,245,0.1);}
.td-num{font-family:Georgia,serif;font-size:13px;color:var(--fog);}
.btn-invite{padding:5px 12px;font-size:9px;font-weight:700;letter-spacing:0.14em;
  text-transform:uppercase;border-radius:3px;cursor:pointer;font-family:inherit;
  transition:all 0.2s;white-space:nowrap;}
.btn-invite-do{background:var(--green-dim);border:1px solid var(--green-border);
  color:var(--green);}
.btn-invite-do:hover{background:rgba(90,170,122,0.25);}
.btn-invite-done{background:transparent;border:1px solid rgba(232,237,245,0.08);
  color:rgba(232,237,245,0.25);cursor:default;}

/* ── EMPTY / LOADING ── */
.table-empty{padding:60px;text-align:center;color:var(--fog);}
.table-empty-icon{font-size:32px;margin-bottom:12px;opacity:0.4;}
.spinner-lg{display:inline-block;width:28px;height:28px;
  border:2px solid rgba(201,168,76,0.2);border-top-color:var(--gold);
  border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── DRAWER ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(10,16,32,0.7);
  z-index:200;display:none;}
.drawer-overlay.open{display:block;}
.drawer{position:fixed;right:0;top:0;bottom:0;width:420px;max-width:100vw;
  background:var(--navy-mid);border-left:1px solid var(--gold-border);
  z-index:201;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);
  display:flex;flex-direction:column;overflow:hidden;}
.drawer.open{transform:translateX(0);}
.drawer-head{padding:24px 24px 20px;border-bottom:1px solid rgba(232,237,245,0.07);
  display:flex;justify-content:space-between;align-items:center;}
.drawer-title{font-family:Georgia,serif;font-size:20px;font-weight:400;color:var(--white);}
.drawer-close{background:none;border:1px solid rgba(232,237,245,0.12);
  border-radius:4px;color:var(--fog);width:32px;height:32px;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;}
.drawer-body{padding:24px;flex:1;overflow-y:auto;}
.drawer-section{margin-bottom:24px;}
.drawer-section-label{font-size:9px;letter-spacing:0.3em;text-transform:uppercase;
  color:var(--gold);margin-bottom:12px;display:block;}
.drawer-row{display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid rgba(232,237,245,0.05);}
.drawer-row:last-child{border-bottom:none;}
.drawer-key{font-size:11px;color:var(--fog);}
.drawer-val{font-size:12px;color:var(--cream);text-align:right;max-width:220px;
  word-break:break-all;}
.drawer-val.gold{color:var(--gold-light);font-family:Georgia,serif;font-size:16px;}
.drawer-foot{padding:20px 24px;border-top:1px solid rgba(232,237,245,0.07);}
.btn-invite-lg{width:100%;padding:13px;font-size:11px;font-weight:700;
  letter-spacing:0.16em;text-transform:uppercase;border-radius:6px;
  cursor:pointer;font-family:inherit;transition:all 0.25s;}
.btn-invite-lg.do{background:linear-gradient(135deg,var(--green),#2a5a3a);
  border:none;color:#fff;}
.btn-invite-lg.done{background:transparent;border:1px solid var(--green-border);
  color:var(--green);cursor:default;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--navy-light);border:1px solid var(--green-border);
  border-radius:6px;padding:12px 20px;font-size:12px;color:var(--green);
  font-weight:600;letter-spacing:0.1em;z-index:300;
  transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── EXPORT ── */
.export-row{display:flex;justify-content:flex-end;margin-bottom:16px;}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginWrap">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-w">W</span>
      <div class="login-name">Winelands Art Gallery</div>
    </div>
    <div class="login-title">Admin — Event Registrations</div>
    <div class="lfield">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="admin@winelands.co.za" autocomplete="email">
    </div>
    <div class="lfield">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="appWrap">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">W · Winelands</span>
      <span class="topbar-badge">Event Registrations</span>
    </div>
    <div class="topbar-right">
      <button class="btn-sm btn-outline" onclick="exportCSV()">Export CSV</button>
      <button class="btn-sm btn-outline" onclick="doSignOut()">Sign Out</button>
    </div>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-card"><div class="stat-num" id="sTotal">—</div><div class="stat-lbl">Total Entries</div></div>
      <div class="stat-card"><div class="stat-num" id="sPrice">—</div><div class="stat-lbl">Guess the Price</div></div>
      <div class="stat-card"><div class="stat-num" id="sWeight">—</div><div class="stat-lbl">Guess the Weight</div></div>
      <div class="stat-card green"><div class="stat-num" id="sInvited">—</div><div class="stat-lbl">Auction Invited</div></div>
      <div class="stat-card white"><div class="stat-num" id="sPending">—</div><div class="stat-lbl">Pending Invite</div></div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <input class="filter-search" id="searchInput" placeholder="Search name, email, WhatsApp…"
        oninput="applyFilters()">
      <div class="filter-tabs">
        <button class="ftab active" onclick="setFilter('all',this)">All</button>
        <button class="ftab" onclick="setFilter('price',this)">Price</button>
        <button class="ftab" onclick="setFilter('weight',this)">Weight</button>
        <button class="ftab" onclick="setFilter('pending',this)">Not Invited</button>
        <button class="ftab" onclick="setFilter('invited',this)">Invited</button>
      </div>
    </div>

    <!-- Export row -->
    <div class="export-row">
      <button class="btn-sm btn-gold" onclick="inviteAll()">Invite All Pending →</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-header">
        <div class="th">#</div>
        <div class="th" onclick="sortBy('last_name')">Name ↕</div>
        <div class="th">Contact</div>
        <div class="th" onclick="sortBy('game_type')">Game</div>
        <div class="th" onclick="sortBy('price_guess')">Guess</div>
        <div class="th" onclick="sortBy('artwork_name')">Artwork / Object</div>
        <div class="th" onclick="sortBy('registered_at')">Registered ↕</div>
        <div class="th">Invite</div>
      </div>
      <div class="table-body" id="tableBody">
        <div class="table-empty">
          <div class="table-empty-icon">⏳</div>
          <div>Loading registrations…</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── DRAWER ── -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="drawer-title" id="drawerTitle">Registration</div>
    <button class="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-foot" id="drawerFoot"></div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ── replace with your real values
const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
const SUPABASE_KEY = 'YOUR_ANON_KEY';

let allRecords = [];
let filteredRecords = [];
let currentFilter = 'all';
let currentSort = { col: 'registered_at', dir: 'desc' };
let currentSession = null;

// ── AUTH ──────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const err   = document.getElementById('loginErr');
  err.classList.remove('show');

  if (!email || !pass) {
    err.textContent = 'Please enter email and password.';
    err.classList.add('show');
    return;
  }

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (data.error || !data.access_token) throw new Error(data.error_description || 'Login failed');

    currentSession = data.access_token;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('appWrap').style.display = 'block';
    loadRegistrations();
  } catch(e) {
    err.textContent = e.message;
    err.classList.add('show');
  }
}

function doSignOut() {
  currentSession = null;
  allRecords = [];
  document.getElementById('appWrap').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
}

// ── DATA ──────────────────────────────────────────────────────
async function loadRegistrations() {
  document.getElementById('tableBody').innerHTML =
    '<div class="table-empty"><div class="spinner-lg"></div></div>';

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/event_registrations?select=*&order=registered_at.desc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${currentSession}` } }
    );
    if (!res.ok) throw new Error('Failed to load');
    allRecords = await res.json();
    updateStats();
    applyFilters();
  } catch(e) {
    document.getElementById('tableBody').innerHTML =
      `<div class="table-empty"><div class="table-empty-icon">⚠️</div><div>${e.message}</div></div>`;
  }
}

function updateStats() {
  const total   = allRecords.length;
  const price   = allRecords.filter(r => r.game_type === 'price').length;
  const weight  = allRecords.filter(r => r.game_type === 'weight').length;
  const invited = allRecords.filter(r => r.auction_invited).length;
  const pending = total - invited;
  document.getElementById('sTotal').textContent   = total;
  document.getElementById('sPrice').textContent   = price;
  document.getElementById('sWeight').textContent  = weight;
  document.getElementById('sInvited').textContent = invited;
  document.getElementById('sPending').textContent = pending;
}

// ── FILTERS & SORT ────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function sortBy(col) {
  if (currentSort.col === col) currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
  else { currentSort.col = col; currentSort.dir = 'asc'; }
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let recs = allRecords.filter(r => {
    if (currentFilter === 'price')   return r.game_type === 'price';
    if (currentFilter === 'weight')  return r.game_type === 'weight';
    if (currentFilter === 'invited') return r.auction_invited;
    if (currentFilter === 'pending') return !r.auction_invited;
    return true;
  });
  if (q) recs = recs.filter(r =>
    `${r.first_name} ${r.last_name} ${r.email} ${r.whatsapp}`.toLowerCase().includes(q)
  );
  const col = currentSort.col;
  const dir = currentSort.dir === 'asc' ? 1 : -1;
  recs.sort((a, b) => {
    const av = a[col] || '', bv = b[col] || '';
    return av < bv ? -dir : av > bv ? dir : 0;
  });
  filteredRecords = recs;
  renderTable();
}

// ── RENDER TABLE ──────────────────────────────────────────────
function renderTable() {
  const body = document.getElementById('tableBody');
  if (!filteredRecords.length) {
    body.innerHTML = '<div class="table-empty"><div class="table-empty-icon">📭</div><div>No registrations found.</div></div>';
    return;
  }
  body.innerHTML = filteredRecords.map((r, i) => {
    const dt   = new Date(r.registered_at);
    const date = dt.toLocaleDateString('en-ZA',{day:'2-digit',month:'short'});
    const time = dt.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'});
    const guess = r.game_type === 'price'
      ? (r.price_guess  != null ? `R ${Number(r.price_guess).toLocaleString('en-ZA')}`  : '—')
      : (r.weight_guess != null ? `${Number(r.weight_guess).toFixed(1)} kg` : '—');
    const invBtn = r.auction_invited
      ? `<button class="btn-invite btn-invite-done" disabled>✓ Invited</button>`
      : `<button class="btn-invite btn-invite-do" onclick="event.stopPropagation();markInvited('${r.id}')">Invite</button>`;
    return `<div class="trow" onclick="openDrawer('${r.id}')">
      <div class="td td-num">${i + 1}</div>
      <div class="td" title="${r.first_name} ${r.last_name}">${r.first_name} ${r.last_name}</div>
      <div class="td muted mono" title="${r.email}">${r.email}</div>
      <div class="td"><span class="badge badge-${r.game_type}">${r.game_type === 'price' ? '🎨 Price' : '⚖️ Weight'}</span></div>
      <div class="td gold">${guess}</div>
      <div class="td muted" title="${r.artwork_name || ''}">${(r.artwork_name || '—').slice(0,22)}</div>
      <div class="td muted">${date} <span style="opacity:0.5">${time}</span></div>
      <div class="td">${invBtn}</div>
    </div>`;
  }).join('');
}

// ── INVITE ────────────────────────────────────────────────────
async function markInvited(id) {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/event_registrations?id=eq.${id}`,
      {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${currentSession}`,
          'Content-Type': 'application/json', 'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ auction_invited: true })
      }
    );
    if (!res.ok) throw new Error();
    const rec = allRecords.find(r => r.id === id);
    if (rec) rec.auction_invited = true;
    updateStats();
    applyFilters();
    showToast('✓ Marked as auction invited');
    if (currentDrawerId === id) openDrawer(id);
  } catch(e) { showToast('⚠ Failed to update — try again'); }
}

async function inviteAll() {
  const pending = filteredRecords.filter(r => !r.auction_invited);
  if (!pending.length) { showToast('No pending registrations to invite'); return; }
  if (!confirm(`Mark all ${pending.length} as auction invited?`)) return;
  for (const r of pending) await markInvited(r.id);
  showToast(`✓ ${pending.length} registrations marked as invited`);
}

// ── DRAWER ────────────────────────────────────────────────────
let currentDrawerId = null;
function openDrawer(id) {
  const r = allRecords.find(x => x.id === id);
  if (!r) return;
  currentDrawerId = id;
  const dt = new Date(r.registered_at);
  const guess = r.game_type === 'price'
    ? (r.price_guess  != null ? `R ${Number(r.price_guess).toLocaleString('en-ZA')}` : '—')
    : (r.weight_guess != null ? `${Number(r.weight_guess).toFixed(1)} kg` : '—');

  document.getElementById('drawerTitle').textContent = `${r.first_name} ${r.last_name}`;
  document.getElementById('drawerBody').innerHTML = `
    <div class="drawer-section">
      <span class="drawer-section-label">Personal Details</span>
      ${row('First Name', r.first_name)}
      ${row('Last Name',  r.last_name)}
      ${row('Email', `<a href="mailto:${r.email}" style="color:var(--gold-light)">${r.email}</a>`)}
      ${row('WhatsApp', `<a href="https://wa.me/${r.whatsapp.replace(/\D/g,'')}" target="_blank" style="color:var(--green)">${r.whatsapp}</a>`)}
    </div>
    <div class="drawer-section">
      <span class="drawer-section-label">Competition Entry</span>
      ${row('Game', r.game_type === 'price' ? '🎨 Guess the Price' : '⚖️ Guess the Weight')}
      ${row('Artwork / Object', r.artwork_name || '—')}
      ${row('Their Guess', guess, true)}
      ${row('Registered', dt.toLocaleString('en-ZA'))}
      ${row('Source', r.source || 'qr_scan')}
    </div>
    <div class="drawer-section">
      <span class="drawer-section-label">Auction Status</span>
      ${row('Auction Invited', r.auction_invited
        ? '<span style="color:var(--green);font-weight:600">✓ Yes — invited</span>'
        : '<span style="color:var(--fog)">Not yet invited</span>')}
    </div>`;

  document.getElementById('drawerFoot').innerHTML = r.auction_invited
    ? `<button class="btn-invite-lg done" disabled>✓ Already Invited to Auction</button>`
    : `<button class="btn-invite-lg do" onclick="markInvited('${r.id}')">Mark as Auction Invited</button>`;

  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function row(key, val, gold) {
  return `<div class="drawer-row">
    <span class="drawer-key">${key}</span>
    <span class="drawer-val${gold?' gold':''}">${val}</span>
  </div>`;
}

function closeDrawer() {
  currentDrawerId = null;
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

// ── EXPORT CSV ────────────────────────────────────────────────
function exportCSV() {
  const cols = ['First Name','Last Name','Email','WhatsApp','Game','Artwork/Object','Price Guess','Weight Guess','Invited','Registered'];
  const rows = allRecords.map(r => [
    r.first_name, r.last_name, r.email, r.whatsapp,
    r.game_type, r.artwork_name || '',
    r.price_guess  != null ? r.price_guess  : '',
    r.weight_guess != null ? r.weight_guess : '',
    r.auction_invited ? 'Yes' : 'No',
    new Date(r.registered_at).toLocaleString('en-ZA')
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv = [cols.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = `winelands-registrations-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
